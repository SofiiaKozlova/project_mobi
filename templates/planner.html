{% extends "base.html" %}
{% block title %}Meeting planner — CoolPark Bamberg{% endblock %}

{% block content %}
<div class="planner-page">
    <div class="page-head">
        <h1 class="page-title">Find a park in the middle</h1>
        <p class="page-sub">Enter two locations to find the best parks to meet halfway.</p>
    </div>

    <div class="planner-form">
        <input type="text" id="person1-input" class="date-input" placeholder="Person 1 location (e.g. Gaustadt)">
        <span class="planner-swap">⇄</span>
        <input type="text" id="person2-input" class="date-input" placeholder="Person 2 location (e.g. Bergstadt)">
        <button id="btn-plan-date" class="date-btn">Find meeting parks</button>
    </div>

    <div id="date-results" class="planner-results"></div>
</div>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='planner.js') }}"></script>
{% endblock %}
