{% extends "base.html" %}
{% block title %}Log in — CoolPark Bamberg{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="page-head"><h1 class="page-title">Log in</h1></div>
    <div class="auth-card">
        <form method="post" action="{{ url_for('auth.login') }}">
            <label class="auth-label">Email
                <input type="email" name="email" class="date-input" placeholder="you@example.com" required>
            </label>
            <label class="auth-label">Password
                <input type="password" name="password" class="date-input" placeholder="••••••••" required>
            </label>
            <button type="submit" class="date-btn">Log in</button>
        </form>
        <p class="auth-switch">No account yet? <a href="{{ url_for('auth.register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
