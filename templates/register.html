{% extends "base.html" %}
{% block title %}Create account — CoolPark Bamberg{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="page-head"><h1 class="page-title">Create account</h1>
        <p class="page-sub">Your email is only used to send the daily park reminders you ask for.</p>
    </div>
    <div class="auth-card">
        <form method="post" action="{{ url_for('auth.register') }}">
            <label class="auth-label">Email
                <input type="email" name="email" class="date-input" placeholder="you@example.com" required>
            </label>
            <label class="auth-label">Password
                <input type="password" name="password" class="date-input" placeholder="At least 6 characters" required minlength="6">
            </label>
            <label class="auth-checkbox">
                <input type="checkbox" name="notify_enabled" checked> Email me a daily park reminder
            </label>
            <button type="submit" class="date-btn">Create account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
